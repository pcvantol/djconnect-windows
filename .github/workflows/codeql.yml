name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "24 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@b02217ab54ff5a93e9ba5ae406ac608f43ff8792
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-windows

  analyze:
    name: Analyze C#
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
