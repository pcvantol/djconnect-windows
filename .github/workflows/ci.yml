name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@b02217ab54ff5a93e9ba5ae406ac608f43ff8792
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-windows

  workflow-hygiene:
    name: Workflow hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.{yml,yaml}"].each { |f| YAML.load_file(f); puts "ok #{f}" }'

      - name: Scan for accidental secret material
        shell: bash
        run: |
          set -euo pipefail
          matches="$(mktemp)"
          rg -n \
            "([A-Za-z0-9_]*token[A-Za-z0-9_]*|password|secret|refresh|authorization|Bearer|djci_|p8|pfx|client_secret|api_key)" \
            -g '!bin/**' \
            -g '!obj/**' \
            -g '!artifacts/**' \
            -g '!publish/**' \
            -g '!.public-release/**' \
            . > "$matches" || true

          if [[ ! -s "$matches" ]]; then
            exit 0
          fi

          unexpected="$(mktemp)"
          grep -Ev \
            '(^|/)(README\.md|SECURITY\.md|PRIVACY\.md|CONTRIBUTING\.md|CHAT_BOOTSTRAP\.md|CHANGELOG\.md|docs/|tests/|tools/|src/DJConnect\.Windows/MainPage\.xaml|src/DJConnect\.Windows/Platforms/Windows/Package\.appxmanifest|src/DJConnect\.Windows/Resources/Strings(\.[a-z]{2})?\.resx|src/DJConnect\.Windows/Services/ApiErrorLocalizer\.cs|src/DJConnect\.Windows/Services/DiagnosticRedactor\.cs|src/DJConnect\.Windows/Services/CredentialStore\.cs|src/DJConnect\.Windows/Services/DJConnectApiClient\.cs|src/DJConnect\.Windows/Services/DJConnectWebSocketPayloadFactory\.cs|src/DJConnect\.Windows/Services/FastPathDiagnosticsFormatter\.cs|src/DJConnect\.Windows/Services/PairingStatePolicy\.cs|src/DJConnect\.Windows/ViewModels/MainViewModel\.cs|src/DJConnect\.Windows/Models/ApiModels\.cs|\.github/workflows/public-unsigned-release\.yml|\.github/workflows/ci\.yml)' \
            "$matches" > "$unexpected" || true

          if [[ -s "$unexpected" ]]; then
            echo "Unexpected secret-like strings found outside approved docs/tests/security plumbing:"
            cat "$unexpected"
            exit 1
          fi

  protocol-tests:
    name: Protocol/core tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Run automatic tests
        run: ./run_tests.sh

      - name: Check test project formatting
        run: dotnet format tests/DJConnect.Tests/DJConnect.Tests.csproj --verify-no-changes --no-restore

  contract-e2e:
    name: Home Assistant contract fixture e2e
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Run HTTP contract e2e
        run: node tools/http_e2e_contract.js

      - name: Run WebSocket contract e2e
        run: node tools/websocket_e2e_contract.js

      - name: Validate fixture security and log redaction
        run: node tools/security_log_redaction_check.js

  dependency-tooling-hygiene:
    name: Dependency and tooling hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify dependency and tooling docs
        shell: bash
        run: |
          set -euo pipefail
          test -s global.json
          test -s THIRD_PARTY_NOTICES.md
          test -s docs/THIRD_PARTY_NOTICES.md
          test -s docs/TECHNICAL_DESIGN_DECISIONS.md

          package_refs="$(rg -No '<PackageReference Include="[^"]+"' src tests | sed -E 's/.*Include="([^"]+)"/\1/' | sort -u)"
          if [[ -z "$package_refs" ]]; then
            echo "No PackageReference entries found."
          else
            while IFS= read -r package; do
              [[ -z "$package" ]] && continue
              if ! rg -q "$package" THIRD_PARTY_NOTICES.md docs/THIRD_PARTY_NOTICES.md docs/TECHNICAL_DESIGN_DECISIONS.md; then
                echo "PackageReference is not reflected in third-party/dependency docs: $package"
                exit 1
              fi
            done <<< "$package_refs"
          fi

      - name: Report current .NET tooling
        run: |
          dotnet --version
          dotnet --info
          dotnet workload list

      - name: Report outdated NuGet packages
        run: |
          dotnet list src/DJConnect.Windows/DJConnect.Windows.csproj package --outdated --include-transitive || true
          dotnet list tests/DJConnect.Tests/DJConnect.Tests.csproj package --outdated --include-transitive || true

  maui-macos-build:
    name: MAUI macOS build
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Check Mac Catalyst Xcode compatibility
        id: xcode
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          version="$(xcodebuild -version | awk '/Xcode/ {print $2}')"
          major="${version%%.*}"
          minor="${version#*.}"
          minor="${minor%%.*}"
          if [[ "$major" -eq 26 && "$minor" -eq 4 ]]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Mac Catalyst build because this runner has Xcode ${version}; the .NET 10 Mac Catalyst workload currently requires Xcode 26.4.x."
          fi

      - name: Install MAUI workload
        if: steps.xcode.outputs.supported == 'true'
        run: dotnet workload restore src/DJConnect.Windows/DJConnect.Windows.csproj -p:TargetFramework=net10.0-maccatalyst

      - name: Restore app dependencies
        if: steps.xcode.outputs.supported == 'true'
        run: dotnet restore src/DJConnect.Windows/DJConnect.Windows.csproj -p:TargetFramework=net10.0-maccatalyst

      - name: Build Mac Catalyst app
        if: steps.xcode.outputs.supported == 'true'
        run: dotnet build src/DJConnect.Windows/DJConnect.Windows.csproj -f net10.0-maccatalyst --no-restore

  maui-windows-build:
    name: MAUI Windows build
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        run: dotnet workload restore src/DJConnect.Windows/DJConnect.Windows.csproj -p:TargetFramework=net10.0-windows10.0.19041.0

      - name: Restore app dependencies
        run: dotnet restore src/DJConnect.Windows/DJConnect.Windows.csproj -p:TargetFramework=net10.0-windows10.0.19041.0

      - name: Restore test dependencies
        run: dotnet restore tests/DJConnect.Tests/DJConnect.Tests.csproj

      - name: Build Windows app
        run: dotnet build src/DJConnect.Windows/DJConnect.Windows.csproj -f net10.0-windows10.0.19041.0 --no-restore

      - name: Run protocol/core tests on Windows
        shell: pwsh
        run: dotnet run --project tests/DJConnect.Tests/DJConnect.Tests.csproj --no-restore

      - name: Check test project formatting on Windows
        shell: pwsh
        run: dotnet format tests/DJConnect.Tests/DJConnect.Tests.csproj --verify-no-changes --no-restore

  windows-release-artifact-sanity:
    name: Windows release artifact sanity
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        shell: pwsh
        run: dotnet workload restore src/DJConnect.Windows/DJConnect.Windows.csproj -p:TargetFramework=net10.0-windows10.0.19041.0

      - name: Publish unsigned Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $project = "src/DJConnect.Windows/DJConnect.Windows.csproj"
          $tfm = "net10.0-windows10.0.19041.0"
          [xml]$projectXml = Get-Content $project
          $version = $projectXml.Project.PropertyGroup.ApplicationDisplayVersion

          New-Item -ItemType Directory -Force -Path ".public-release/artifacts" | Out-Null
          foreach ($rid in @("win-x64", "win-arm64")) {
            $outputDir = ".public-release/windows/$rid"
            dotnet restore $project -p:TargetFramework=$tfm -p:RuntimeIdentifier=$rid -r $rid
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            dotnet publish $project `
              -c Release `
              -f $tfm `
              -r $rid `
              --no-restore `
              -p:RuntimeIdentifier=$rid `
              -p:PublishReadyToRun=false `
              -p:WindowsPackageType=None `
              -o $outputDir
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            $arch = if ($rid -eq "win-arm64") { "arm64" } else { "x64" }
            $zipPath = ".public-release/artifacts/DJConnect-Windows-$arch-$version-unsigned.zip"
            Compress-Archive -Path "$outputDir/*" -DestinationPath $zipPath -Force
            $hash = Get-FileHash -Algorithm SHA256 $zipPath
            "$($hash.Hash.ToLowerInvariant())  $(Split-Path -Leaf $zipPath)" |
              Set-Content -NoNewline -Encoding ascii ".public-release/artifacts/DJConnect-Windows-$arch-$version-SHA256SUMS.txt"
          }

      - name: Validate unsigned artifact shape
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zips = Get-ChildItem ".public-release/artifacts" -Filter "DJConnect-Windows-*-unsigned.zip"
          $checksums = Get-ChildItem ".public-release/artifacts" -Filter "DJConnect-Windows-*-SHA256SUMS.txt"
          if ($zips.Count -ne 2) {
            throw "Expected exactly 2 unsigned Windows zip artifacts, found $($zips.Count)."
          }
          if ($checksums.Count -ne 2) {
            throw "Expected exactly 2 checksum files, found $($checksums.Count)."
          }
          foreach ($zip in $zips) {
            if ($zip.Length -le 0) {
              throw "Artifact is empty: $($zip.Name)."
            }
            $listing = tar -tf $zip.FullName
            if (-not ($listing -match "DJConnect\.exe")) {
              throw "Artifact does not contain DJConnect.exe: $($zip.Name)."
            }
          }

  cleanup-workflow-runs:
    name: Cleanup workflow runs
    runs-on: ubuntu-latest
    needs:
      - workflow-hygiene
      - protocol-tests
      - dependency-tooling-hygiene
      - maui-macos-build
      - maui-windows-build
      - windows-release-artifact-sanity
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      CURRENT_RUN_ID: ${{ github.run_id }}
      KEEP_RUNS: "2"
    steps:
      - name: Delete old completed workflow runs
        shell: bash
        run: |
          set -euo pipefail

          current_workflow_id="$(
            gh api "repos/${REPOSITORY}/actions/runs/${CURRENT_RUN_ID}" \
              --method GET \
              --jq '.workflow_id'
          )"

          mapfile -t workflow_ids < <(
            gh api "repos/${REPOSITORY}/actions/workflows" \
              --method GET \
              --paginate \
              --jq '.workflows[].id'
          )

          for workflow_id in "${workflow_ids[@]}"; do
            [[ -z "${workflow_id}" ]] && continue

            keep_limit="${KEEP_RUNS}"
            if [[ "${workflow_id}" == "${current_workflow_id}" ]]; then
              keep_limit=$((KEEP_RUNS - 1))
            fi

            mapfile -t run_ids < <(
              gh api "repos/${REPOSITORY}/actions/workflows/${workflow_id}/runs?status=completed&per_page=100" \
                --method GET \
                --paginate \
                --jq '.workflow_runs | sort_by(.created_at) | reverse | .[].id'
            )

            if ((${#run_ids[@]} <= keep_limit)); then
              continue
            fi

            for index in "${!run_ids[@]}"; do
              run_id="${run_ids[$index]}"
              [[ -z "${run_id}" ]] && continue

              if ((index < keep_limit)) || [[ "${run_id}" == "${CURRENT_RUN_ID}" ]]; then
                continue
              fi

              gh api \
                --method DELETE \
                "repos/${REPOSITORY}/actions/runs/${run_id}"
            done
          done
