name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  pull-requests: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  protocol-tests:
    name: Protocol/core tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Run automatic tests
        run: ./run_tests.sh

      - name: Check test project formatting
        run: dotnet format tests/DJConnect.Tests/DJConnect.Tests.csproj --verify-no-changes --no-restore

  maui-macos-build:
    name: MAUI macOS build
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Check Mac Catalyst Xcode compatibility
        id: xcode
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          version="$(xcodebuild -version | awk '/Xcode/ {print $2}')"
          major="${version%%.*}"
          minor="${version#*.}"
          minor="${minor%%.*}"
          if [[ "$major" -eq 26 && "$minor" -eq 4 ]]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Mac Catalyst build because this runner has Xcode ${version}; the .NET 10 Mac Catalyst workload currently requires Xcode 26.4.x."
          fi

      - name: Install MAUI workload
        if: steps.xcode.outputs.supported == 'true'
        run: dotnet workload restore src/DJConnect.Windows/DJConnect.Windows.csproj -p:TargetFramework=net10.0-maccatalyst

      - name: Restore app dependencies
        if: steps.xcode.outputs.supported == 'true'
        run: dotnet restore src/DJConnect.Windows/DJConnect.Windows.csproj -p:TargetFramework=net10.0-maccatalyst

      - name: Build Mac Catalyst app
        if: steps.xcode.outputs.supported == 'true'
        run: dotnet build src/DJConnect.Windows/DJConnect.Windows.csproj -f net10.0-maccatalyst --no-restore

  maui-windows-build:
    name: MAUI Windows build
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        run: dotnet workload restore src/DJConnect.Windows/DJConnect.Windows.csproj -p:TargetFramework=net10.0-windows10.0.19041.0

      - name: Restore app dependencies
        run: dotnet restore src/DJConnect.Windows/DJConnect.Windows.csproj -p:TargetFramework=net10.0-windows10.0.19041.0

      - name: Build Windows app
        run: dotnet build src/DJConnect.Windows/DJConnect.Windows.csproj -f net10.0-windows10.0.19041.0 --no-restore
