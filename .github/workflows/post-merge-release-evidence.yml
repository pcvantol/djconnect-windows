name: Post-Merge Release Evidence

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read
  statuses: write

jobs:
  reconcile:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    uses: pcvantol/djconnect/.github/workflows/post-merge-release-evidence.yml@a73237f907554b2fba16e0e168d5fde22ce75455
    with:
      policy_source_ref: 2c65089aa2654e749852ab82728119e8c106c1ad
      required_main_workflow: CI
      repository_role: active_source
      coverage_artifact_name: windows-cobertura-coverage
