name: Public unsigned release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 3.1.1"
        required: true

concurrency:
  group: public-unsigned-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  PUBLIC_REPO: pcvantol/djconnect-app-releases
  PROJECT_PATH: src/DJConnect.Windows/DJConnect.Windows.csproj
  MACCATALYST_TFM: net10.0-maccatalyst
  WINDOWS_TFM: net10.0-windows10.0.19041.0

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@5b235069a79f3f650e497a5b64a4bce4aeb1e031
    with:
      execution_profile: release
      owner: pcvantol/djconnect-windows

  resolve-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $version" >&2
            exit 64
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  build-maccatalyst:
    name: Build unsigned Mac Catalyst app
    runs-on: macos-latest
    needs: resolve-version
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          global-json-file: global.json

      - name: Select compatible Xcode
        id: xcode
        shell: bash
        run: |
          set -euo pipefail
          for candidate in /Applications/Xcode_26.5.app /Applications/Xcode_26.4.1.app /Applications/Xcode_26.4.app /Applications/Xcode.app; do
            if [[ -d "$candidate" ]]; then
              echo "MD_APPLE_SDK_ROOT=$candidate" >> "$GITHUB_ENV"
              echo "DEVELOPER_DIR=$candidate/Contents/Developer" >> "$GITHUB_ENV"
              sudo xcode-select -s "$candidate/Contents/Developer"
              break
            fi
          done
          xcodebuild -version
          version="$(xcodebuild -version | awk '/Xcode/ {print $2}')"
          major="${version%%.*}"
          minor="${version#*.}"
          minor="${minor%%.*}"
          if [[ "$major" -eq 26 && "$minor" -eq 4 ]]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Mac Catalyst release artifact because this runner has Xcode ${version}; the .NET 10 Mac Catalyst workload currently requires Xcode 26.4.x."
          fi

      - name: Install MAUI workload
        if: steps.xcode.outputs.supported == 'true'
        run: dotnet workload restore "$PROJECT_PATH" -p:TargetFramework="$MACCATALYST_TFM"

      - name: Restore app dependencies
        if: steps.xcode.outputs.supported == 'true'
        run: dotnet restore "$PROJECT_PATH" -p:TargetFramework="$MACCATALYST_TFM"

      - name: Publish unsigned Mac Catalyst app
        if: steps.xcode.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          rm -rf .public-release
          mkdir -p .public-release/artifacts .public-release/maccatalyst
          dotnet publish "$PROJECT_PATH" \
            -c Release \
            -f "$MACCATALYST_TFM" \
            --no-restore \
            -p:BuildIpa=False \
            -p:CodesignKey= \
            -p:CodesignProvision= \
            -o .public-release/maccatalyst

          app_path="$(find .public-release/maccatalyst -maxdepth 3 -type d -name 'DJConnect.app' | head -n 1)"
          if [[ -z "$app_path" ]]; then
            echo "Could not find DJConnect.app in Mac Catalyst publish output." >&2
            find .public-release/maccatalyst -maxdepth 3 -print >&2
            exit 1
          fi
          ditto -c -k --keepParent \
            "$app_path" \
            ".public-release/artifacts/DJConnect-MacCatalyst-${version}-unsigned.zip"
          cd .public-release/artifacts
          shasum -a 256 "DJConnect-MacCatalyst-${version}-unsigned.zip" > "DJConnect-MacCatalyst-${version}-SHA256SUMS.txt"

      - name: Upload Mac Catalyst artifact
        if: steps.xcode.outputs.supported == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: public-maccatalyst-release
          path: .public-release/artifacts/*
          if-no-files-found: error

  build-windows:
    name: Build unsigned Windows app
    runs-on: [self-hosted, internal-release, qualification, windows11]
    env:
      DOTNET_INSTALL_DIR: ${{ runner.temp }}\dotnet
    defaults:
      run:
        shell: powershell
    needs: resolve-version
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        shell: powershell
        run: dotnet workload restore $env:PROJECT_PATH -p:TargetFramework=$env:WINDOWS_TFM

      - name: Restore app dependencies
        shell: powershell
        run: dotnet restore $env:PROJECT_PATH -p:TargetFramework=$env:WINDOWS_TFM

      - name: Publish unsigned Windows app
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ needs.resolve-version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path ".public-release/artifacts" | Out-Null

          foreach ($rid in @("win-x64", "win-arm64")) {
            $outputDir = ".public-release/windows/$rid"
            dotnet restore $env:PROJECT_PATH `
              -p:TargetFramework=$env:WINDOWS_TFM `
              -p:RuntimeIdentifier=$rid `
              -r $rid
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            dotnet publish $env:PROJECT_PATH `
              -c Release `
              -f $env:WINDOWS_TFM `
              -r $rid `
              --no-restore `
              -p:RuntimeIdentifier=$rid `
              -p:PublishReadyToRun=false `
              -p:WindowsPackageType=None `
              -o $outputDir
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            $arch = if ($rid -eq "win-arm64") { "arm64" } else { "x64" }
            $zipPath = ".public-release/artifacts/DJConnect-Windows-$arch-$version-unsigned.zip"
            Compress-Archive -Path "$outputDir/*" -DestinationPath $zipPath -Force
            $hashPath = ".public-release/artifacts/DJConnect-Windows-$arch-$version-SHA256SUMS.txt"
            $hash = Get-FileHash -Algorithm SHA256 $zipPath
            "$($hash.Hash.ToLowerInvariant())  $(Split-Path -Leaf $zipPath)" | Set-Content -NoNewline -Encoding ascii $hashPath
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: public-windows-release
          path: .public-release/artifacts/*
          if-no-files-found: error

  publish-public-releases:
    name: Publish to public releases repo
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - build-maccatalyst
      - build-windows
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Download Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: public-windows-release
          path: .public-release/artifacts

      - name: Download Mac Catalyst artifact
        id: download-maccatalyst
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        continue-on-error: true
        with:
          name: public-maccatalyst-release
          path: .public-release/artifacts

      - name: Create combined checksums
        shell: bash
        run: |
          set -euo pipefail
          cd .public-release/artifacts
          sha256sum *.zip > SHA256SUMS.txt

      - name: Extract public release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          mkdir -p .public-release/release-notes

          extract_changelog_notes() {
            local source_file="$1"
            local target_file="$2"
            if [[ -f "$source_file" ]]; then
              awk -v version="$version" '
                $0 ~ "^## " version "($| - )" { capture=1; next }
                capture && /^## / { capture=0 }
                capture { print }
              ' "$source_file" > "$target_file"
            fi
          }

          languages=(en nl de fr es)
          for lang in "${languages[@]}"; do
            : > ".public-release/release-notes/base-${lang}.md"
          done

          if [[ -f "docs/release-notes/en/v${version}.md" ]]; then
            cp "docs/release-notes/en/v${version}.md" ".public-release/release-notes/base-en.md"
          elif [[ -f "docs/release-notes/v${version}.md" ]]; then
            cp "docs/release-notes/v${version}.md" ".public-release/release-notes/base-en.md"
          else
            extract_changelog_notes "CHANGELOG.md" ".public-release/release-notes/base-en.md"
          fi
          if [[ ! -s ".public-release/release-notes/base-en.md" ]]; then
            printf "DJConnect Windows %s\n" "$version" > ".public-release/release-notes/base-en.md"
          fi

          for lang in nl de fr es; do
            base=".public-release/release-notes/base-${lang}.md"
            if [[ -f "docs/release-notes/${lang}/v${version}.md" ]]; then
              cp "docs/release-notes/${lang}/v${version}.md" "$base"
            elif [[ "$lang" == "nl" ]]; then
              extract_changelog_notes "CHANGELOG.nl.md" "$base"
            fi
            if [[ ! -s "$base" ]]; then
              cp ".public-release/release-notes/base-en.md" "$base"
            fi
          done

          for platform in Windows MacCatalyst; do
            for lang in "${languages[@]}"; do
              notes=".public-release/release-notes-${platform}-${lang}.md"
              base=".public-release/release-notes/base-${lang}.md"
              {
                cat "$base"
                echo
                echo "---"
                echo
                echo "Platform: ${platform}"
                echo
                case "$lang" in
                  nl)
                    echo "Niet-ondertekende CI-artifacts zijn bedoeld voor diagnostics en interne validatie."
                    [[ "$platform" == "Windows" ]] && echo "Windows-artifacts zijn niet ondertekend en nog geen Store/MSIX-installer." || echo "Mac Catalyst-artifacts zijn niet ondertekend en niet genotariseerd."
                    ;;
                  de)
                    echo "Nicht signierte CI-Artefakte sind für Diagnose und interne Validierung gedacht."
                    [[ "$platform" == "Windows" ]] && echo "Windows-Artefakte sind nicht signiert und noch kein Store/MSIX-Installer." || echo "Mac Catalyst-Artefakte sind nicht signiert und nicht notarisiert."
                    ;;
                  fr)
                    echo "Les artefacts CI non signés sont destinés au diagnostic et à la validation interne."
                    [[ "$platform" == "Windows" ]] && echo "Les artefacts Windows ne sont pas signés et ne sont pas encore un installateur Store/MSIX." || echo "Les artefacts Mac Catalyst ne sont pas signés ni notariés."
                    ;;
                  es)
                    echo "Los artefactos de CI sin firmar son para diagnóstico y validación interna."
                    [[ "$platform" == "Windows" ]] && echo "Los artefactos de Windows no están firmados y todavía no son un instalador Store/MSIX." || echo "Los artefactos de Mac Catalyst no están firmados ni notarizados."
                    ;;
                  *)
                    echo "Unsigned CI artifacts are intended for diagnostics and internal validation."
                    [[ "$platform" == "Windows" ]] && echo "Windows artifacts are unsigned and are not a store/MSIX installer yet." || echo "Mac Catalyst artifacts are unsigned and not notarized."
                    ;;
                esac
              } > "$notes"
            done
            cp ".public-release/release-notes-${platform}-en.md" ".public-release/release-notes-${platform}.md"
          done

      - name: Publish to public releases repository
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "Configure repository secret PUBLIC_RELEASES_TOKEN with access to ${PUBLIC_REPO}." >&2
            exit 1
          fi

          version="${{ needs.resolve-version.outputs.version }}"
          windows_tag="windows/v${version}"
          maccatalyst_tag="maccatalyst/v${version}"

          publish_release() {
            local tag="$1"
            local title="$2"
            local notes_file="$3"
            shift 3
            if gh release view "$tag" --repo "$PUBLIC_REPO" >/dev/null 2>&1; then
              gh release edit "$tag" \
                --repo "$PUBLIC_REPO" \
                --title "$title" \
                --notes-file "$notes_file" \
                --latest=false
            else
              gh release create "$tag" \
                --repo "$PUBLIC_REPO" \
                --title "$title" \
                --notes-file "$notes_file" \
                --latest=false
            fi
            gh release upload "$tag" "$@" --repo "$PUBLIC_REPO" --clobber
          }

          publish_release \
            "$windows_tag" \
            "DJConnect Windows ${version}" \
            .public-release/release-notes-Windows-en.md \
            ".public-release/artifacts/DJConnect-Windows-x64-${version}-unsigned.zip" \
            ".public-release/artifacts/DJConnect-Windows-x64-${version}-SHA256SUMS.txt" \
            ".public-release/artifacts/DJConnect-Windows-arm64-${version}-unsigned.zip" \
            ".public-release/artifacts/DJConnect-Windows-arm64-${version}-SHA256SUMS.txt" \
            .public-release/artifacts/SHA256SUMS.txt

          if [[ -f ".public-release/artifacts/DJConnect-MacCatalyst-${version}-unsigned.zip" ]]; then
            publish_release \
              "$maccatalyst_tag" \
              "DJConnect Mac Catalyst ${version}" \
              .public-release/release-notes-MacCatalyst-en.md \
              ".public-release/artifacts/DJConnect-MacCatalyst-${version}-unsigned.zip" \
              ".public-release/artifacts/DJConnect-MacCatalyst-${version}-SHA256SUMS.txt" \
              .public-release/artifacts/SHA256SUMS.txt
          else
            echo "::notice::No Mac Catalyst artifact was produced; skipping maccatalyst/v${version} public release."
          fi

          for prefix in windows maccatalyst; do
            keep_seen=0
            gh release list --repo "$PUBLIC_REPO" --limit 100 --json tagName \
              --jq ".[] | select(.tagName | startswith(\"${prefix}/v\")) | .tagName" \
              | while IFS= read -r old_tag; do
              if [[ "$keep_seen" -eq 0 ]]; then
                keep_seen=1
                continue
              fi
              gh release delete "$old_tag" --repo "$PUBLIC_REPO" --yes || true
              git push "https://x-access-token:${GH_TOKEN}@github.com/${PUBLIC_REPO}.git" ":refs/tags/${old_tag}" || true
            done
          done

      - name: Publish static release notes to djconnect.dev
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_RELEASE_NOTES_TOKEN }}
          WEBSITE_REPO: pcvantol/djconnect-website
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "Configure repository secret WEBSITE_RELEASE_NOTES_TOKEN with write access to ${WEBSITE_REPO}." >&2
            exit 1
          fi

          version="${{ needs.resolve-version.outputs.version }}"
          website_dir=".public-release/website"
          rm -rf "$website_dir"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${WEBSITE_REPO}.git" "$website_dir"

          for platform in windows maccatalyst; do
            case "$platform" in
              windows)
                platform_name="Windows"
                title="DJConnect Windows ${version}"
                ;;
              maccatalyst)
                platform_name="MacCatalyst"
                title="DJConnect Mac Catalyst ${version}"
                ;;
            esac

            target_dir="${website_dir}/wwwroot/release-notes/${platform}"
            mkdir -p "$target_dir"
            for lang in en nl de fr es; do
              localized_dir="${target_dir}/${lang}"
              mkdir -p "$localized_dir"
              source_notes=".public-release/release-notes-${platform_name}-${lang}.md"
              cp "$source_notes" "${localized_dir}/v${version}.md"
              RELEASE_VERSION="$version" \
              RELEASE_PLATFORM="$platform" \
              RELEASE_LANGUAGE="$lang" \
              RELEASE_TITLE="$title" \
              RELEASE_BODY_PATH="${localized_dir}/v${version}.md" \
              RELEASE_JSON_PATH="${localized_dir}/v${version}.json" \
                node -e 'const fs=require("fs"); const payload={version:process.env.RELEASE_VERSION, platform:process.env.RELEASE_PLATFORM, language:process.env.RELEASE_LANGUAGE, name:process.env.RELEASE_TITLE, body:fs.readFileSync(process.env.RELEASE_BODY_PATH, "utf8").trim()}; fs.writeFileSync(process.env.RELEASE_JSON_PATH, JSON.stringify(payload, null, 2) + "\n");'
            done

            cp "${target_dir}/en/v${version}.md" "${target_dir}/v${version}.md"
            cp "${target_dir}/en/v${version}.json" "${target_dir}/v${version}.json"
          done

          cd "$website_dir"
          git fetch origin main --depth 1
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "Website release notes checkout is not based on origin/main." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wwwroot/release-notes
          if git diff --cached --quiet; then
            echo "Static release notes already up to date."
          else
            git commit -m "chore: publish windows app release notes ${version}"
            git push origin HEAD:main
          fi
