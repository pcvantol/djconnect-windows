name: Windows post-deployment smoke

on:
  workflow_dispatch:
    inputs:
      candidate_sha: {required: true, type: string}
      manifest_id: {required: true, type: string}
      artifact_id: {required: true, type: string}
      artifact_sha256: {required: true, type: string}
      target: {required: true, type: choice, options: [windows_internal_arm64]}
      platform_version: {required: true, type: string}
      release_profile: {required: true, type: choice, options: [INTERNAL_RELEASE]}
      deployment_workflow_run: {required: true, type: string}

permissions:
  actions: read
  contents: read

concurrency:
  group: windows-internal-arm64-interactive-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: [self-hosted, Windows, ARM64, internal-release]
    environment: windows-internal-deployment
    env:
      DJCONNECT_WINDOWS_INTERNAL_INSTALL_ROOT: ${{ vars.DJCONNECT_WINDOWS_INTERNAL_INSTALL_ROOT }}
    steps:
      - name: Validate immutable smoke request
        shell: powershell -ExecutionPolicy Bypass -File {0}
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          TARGET: ${{ inputs.target }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
          DEPLOYMENT_WORKFLOW_RUN: ${{ inputs.deployment_workflow_run }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:CANDIDATE_SHA -notmatch '^[0-9a-f]{40}$' -or $env:MANIFEST_ID -notmatch '^release-[A-Za-z0-9._-]+$' -or $env:ARTIFACT_ID -notmatch '^release-asset:pcvantol/djconnect-app-releases:windows/v[0-9]+\.[0-9]+\.[0-9]+:DJConnect-Windows-arm64-[0-9]+\.[0-9]+\.[0-9]+-unsigned\.zip$' -or $env:ARTIFACT_SHA256 -notmatch '^[0-9a-f]{64}$' -or $env:PLATFORM_VERSION -notmatch '^[0-9]+\.[0-9]+$' -or $env:DEPLOYMENT_WORKFLOW_RUN -notmatch '^[0-9]+$') { throw 'Invalid immutable smoke identity' }
          if ($env:TARGET -ne 'windows_internal_arm64' -or $env:RELEASE_PROFILE -ne 'INTERNAL_RELEASE') { throw 'Invalid smoke target or profile' }
      - name: Verify target deployment readiness
        uses: pcvantol/djconnect/.github/actions/deployment-readiness-preflight@3d7d24a84b3aaacb8f2fb229e09c33da85e0545d
        with:
          target: ${{ inputs.target }}
          manifest_id: ${{ inputs.manifest_id }}
          candidate_sha: ${{ inputs.candidate_sha }}
          artifact_id: ${{ inputs.artifact_id }}
          artifact_sha256: ${{ inputs.artifact_sha256 }}
          expected_runner_os: Windows
          expected_runner_arch: ARM64
          required_configuration: DJCONNECT_WINDOWS_INTERNAL_INSTALL_ROOT
          smoke_contract: windows-internal-arm64-smoke-v2
      - id: manifest
        name: Verify approved central manifest binding
        shell: powershell -ExecutionPolicy Bypass -File {0}
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          TARGET: ${{ inputs.target }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
        run: |
          $ErrorActionPreference = 'Stop'
          $manifest = Invoke-RestMethod -Uri 'https://raw.githubusercontent.com/pcvantol/djconnect/main/docs/release/PLATFORM_3_3_CURRENT_MAIN_MANIFEST_PROPOSAL.json'
          if ($manifest.status -notin @('APPROVED_DEPLOYMENT_DISPATCH_PENDING', 'APPROVED_PARTIAL_DEPLOYMENT_OPERATIONAL') -or $manifest.approval.state -ne 'APPROVED') { throw 'Windows smoke requires an approved operational manifest.' }
          if ($manifest.manifest_id -ne $env:MANIFEST_ID -or $manifest.release_profile -ne $env:RELEASE_PROFILE -or $manifest.platform_version -ne $env:PLATFORM_VERSION) { throw 'Manifest identity does not match the smoke request.' }
          $source = @($manifest.repositories | Where-Object { $_.repository -eq $env:GITHUB_REPOSITORY -and $_.source_sha -eq $env:CANDIDATE_SHA -and $_.version -eq $manifest.release_version })
          $binding = @($manifest.artifact_bindings | Where-Object { $_.target -eq $env:TARGET -and $_.artifact_id -eq $env:ARTIFACT_ID -and $_.artifact_sha256 -eq $env:ARTIFACT_SHA256 })
          $authorization = @($manifest.approval.additional_target_authorizations | Where-Object { $_.target -eq $env:TARGET -and $_.candidate_sha -eq $env:CANDIDATE_SHA -and $_.artifact_id -eq $env:ARTIFACT_ID -and $_.artifact_sha256 -eq $env:ARTIFACT_SHA256 })
          if ($source.Count -ne 1 -or $binding.Count -ne 1 -or $authorization.Count -ne 1) { throw 'Smoke identity is not bound by the approved manifest authorization.' }
          "release_version=$($manifest.release_version)" >> $env:GITHUB_OUTPUT
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: windows-internal-deployment-evidence
          run-id: ${{ inputs.deployment_workflow_run }}
          github-token: ${{ github.token }}
          path: deployment-evidence
      - name: Verify successful deployment evidence and perform bounded smoke
        shell: powershell -ExecutionPolicy Bypass -File {0}
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          TARGET: ${{ inputs.target }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
          DEPLOYMENT_WORKFLOW_RUN: ${{ inputs.deployment_workflow_run }}
          EXPECTED_VERSION: ${{ steps.manifest.outputs.release_version }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $evidencePath = @(Get-ChildItem -Path deployment-evidence -Filter windows-internal-deployment-evidence.json -Recurse)
          if ($evidencePath.Count -ne 1) { throw 'Expected one deployment evidence record.' }
          $deployment = Get-Content -Raw $evidencePath[0] | ConvertFrom-Json
          foreach ($name in 'candidate_sha', 'manifest_id', 'artifact_id', 'artifact_sha256', 'target', 'platform_version', 'release_profile', 'deployment_workflow_run') {
            if ([string]$deployment.$name -ne [string](Get-Item "env:$($name.ToUpperInvariant())").Value) { throw "Deployment evidence mismatch: $name" }
          }
          if ($deployment.deployment_result -ne 'DEPLOYED_PENDING_SMOKE') { throw 'Deployment evidence is not eligible for smoke.' }
          $run = Invoke-RestMethod -Headers @{ Authorization = "Bearer $env:GITHUB_TOKEN"; Accept = 'application/vnd.github+json' } -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/actions/runs/$env:DEPLOYMENT_WORKFLOW_RUN"
          if ($run.conclusion -ne 'success' -or $run.path -ne '.github/workflows/windows-internal-deployment.yml') { throw 'Referenced deployment workflow did not succeed.' }
          if ([string]::IsNullOrWhiteSpace($env:DJCONNECT_WINDOWS_INTERNAL_INSTALL_ROOT) -or -not [IO.Path]::IsPathRooted($env:DJCONNECT_WINDOWS_INTERNAL_INSTALL_ROOT)) { throw 'DJCONNECT_WINDOWS_INTERNAL_INSTALL_ROOT must be an absolute path.' }
          $executable = Join-Path ([IO.Path]::GetFullPath($env:DJCONNECT_WINDOWS_INTERNAL_INSTALL_ROOT)) 'current\\DJConnect.exe'
          if (-not (Test-Path $executable)) { throw 'Installed DJConnect executable is absent.' }
          $observedVersion = (Get-Item $executable).VersionInfo.ProductVersion
          if ($observedVersion -notlike "$env:EXPECTED_VERSION*") { throw "Installed version mismatch: $observedVersion" }
          $start = Get-Date
          $failure = $null
          $failureClassification = 'none'
          $startupMarker = 'NOT_STARTED'
          $processExited = $null
          $processExitCode = $null
          $processSessionId = $null
          $runnerSessionKind = 'service_orchestration'
          $relayRoot = Join-Path $env:ProgramData 'DJConnect\interactive-gui-smoke'
          $configPath = Join-Path $relayRoot 'relay-config.json'
          $requestsDirectory = Join-Path $relayRoot 'requests'
          $resultsDirectory = Join-Path $relayRoot 'results'
          $relayResult = 'NOT_STARTED'
          $relayRequestId = [Guid]::NewGuid().ToString()
          $requestPath = Join-Path $requestsDirectory "$relayRequestId.json"
          $resultPath = Join-Path $resultsDirectory "$relayRequestId.json"
          try {
            if (-not (Test-Path -LiteralPath $configPath) -or -not (Test-Path -LiteralPath $requestsDirectory) -or -not (Test-Path -LiteralPath $resultsDirectory)) { throw 'Interactive GUI smoke relay is not installed.' }
            $relayConfig = Get-Content -Raw -LiteralPath $configPath | ConvertFrom-Json
            if ($relayConfig.schema_version -ne 1 -or [IO.Path]::GetFullPath([string]$relayConfig.install_root) -ne [IO.Path]::GetFullPath($env:DJCONNECT_WINDOWS_INTERNAL_INSTALL_ROOT)) { throw 'Interactive GUI smoke relay configuration does not bind to this deployment root.' }
            [ordered]@{ schema_version = 1; request_id = $relayRequestId; expected_version = $env:EXPECTED_VERSION; submitted_at = (Get-Date).ToUniversalTime().ToString('o') } | ConvertTo-Json -Compress | Set-Content -LiteralPath $requestPath -NoNewline -Encoding utf8
            $deadline = (Get-Date).AddSeconds(180)
            while (-not (Test-Path -LiteralPath $resultPath) -and (Get-Date) -lt $deadline) { Start-Sleep -Seconds 2 }
            if (-not (Test-Path -LiteralPath $resultPath)) {
              $failureClassification = 'INTERACTIVE_RELAY_UNAVAILABLE'
              $failure = 'Interactive GUI smoke relay did not return evidence within 180 seconds. Keep the configured smoke user signed in.'
            } else {
              $relay = Get-Content -Raw -LiteralPath $resultPath | ConvertFrom-Json
              if ($relay.schema_version -ne 1 -or $relay.request_id -ne $relayRequestId -or $relay.expected_version -ne $env:EXPECTED_VERSION -or $relay.observed_version -notlike "$env:EXPECTED_VERSION*") { throw 'Interactive GUI smoke relay evidence is invalid.' }
              $relayResult = $relay.final_result
              $startupMarker = $relay.startup_marker_result
              $processExited = $relay.process_exited
              $processExitCode = $relay.process_exit_code
              $processSessionId = $relay.process_session_id
              if ($relay.relay_session_kind -ne 'interactive_user_task' -or $processSessionId -eq 0) { throw 'Interactive GUI smoke relay did not execute in an interactive session.' }
              if ($relay.final_result -ne 'PASS') { $failureClassification = $relay.failure_classification; $failure = "Interactive GUI smoke relay failed: $($relay.failure_classification)." }
            }
          } catch {
            if ($failureClassification -eq 'none') { $failureClassification = 'SMOKE_EXECUTION_ERROR' }
            $failure = $_.Exception.Message
          } finally {
            $finalResult = if ($failure) { 'SMOKE_FAIL' } else { 'SMOKE_PASS' }
            $healthResult = if ($failure) { 'FAIL' } else { 'PASS' }
            if (Test-Path -LiteralPath $requestPath) { Remove-Item -LiteralPath $requestPath -Force -ErrorAction SilentlyContinue }
            $smoke = [ordered]@{ schema_version = 3; repository = $env:GITHUB_REPOSITORY; candidate_sha = $env:CANDIDATE_SHA; platform_version = $env:PLATFORM_VERSION; manifest_id = $env:MANIFEST_ID; deployment_workflow_run = $env:DEPLOYMENT_WORKFLOW_RUN; smoke_workflow_run = $env:GITHUB_RUN_ID; runner_identity = "$env:RUNNER_OS/$env:RUNNER_ARCH"; target = $env:TARGET; route_type = 'interactive_local_application'; protocol = 'process'; endpoint_class = 'not_applicable'; authentication_mode = 'not_applicable'; artifact_id = $env:ARTIFACT_ID; artifact_sha256 = $env:ARTIFACT_SHA256; expected_version = $env:EXPECTED_VERSION; observed_version = $observedVersion; health_result = $healthResult; websocket_result = 'NOT_APPLICABLE'; startup_marker_result = $startupMarker; process_exited = $processExited; process_exit_code = $processExitCode; process_session_id = $processSessionId; runner_session_kind = $runnerSessionKind; relay_result = $relayResult; retry_count = 0; stabilization_window = 'PT10S'; timestamps = @{ started_at = $start.ToUniversalTime().ToString('o'); observed_at = (Get-Date).ToUniversalTime().ToString('o') }; final_result = $finalResult; failure_classification = $failureClassification; recovery_reference = 'windows-interactive-gui-smoke-relay-v1' }
            $smoke | ConvertTo-Json -Depth 5 -Compress | Set-Content -NoNewline -Encoding utf8 windows-post-deployment-smoke-evidence.json
          }
          if ($failure) { throw $failure }
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: windows-post-deployment-smoke-evidence
          path: windows-post-deployment-smoke-evidence.json
          if-no-files-found: error
