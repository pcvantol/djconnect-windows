name: Platform release execution contract

on:
  workflow_dispatch:
    inputs:
      action:
        required: true
        type: choice
        options: [build, artifact_publication, deployment, post_release, rollback]
      candidate_sha:
        required: true
        type: string
      execution_mode:
        required: true
        type: choice
        options: [dry_run, execute]
      manifest_id:
        required: true
        type: string
      platform_version:
        required: true
        type: string
      release_profile:
        required: true
        type: choice
        options: [INTERNAL_RELEASE]

permissions:
  contents: read

jobs:
  validate-and-evidence:
    name: Validate qualified release dispatch
    runs-on: [self-hosted, internal-release, qualification, windows11]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 1
      - name: Validate bounded request and candidate
        shell: powershell -ExecutionPolicy Bypass -File {0}
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          EXECUTION_MODE: ${{ inputs.execution_mode }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:RELEASE_PROFILE -ne "INTERNAL_RELEASE") { throw "unsupported release profile" }
          # Execution-mode mutations remain disabled until this repository's
          # platform-native build and deployment action is qualified.
          if ($env:EXECUTION_MODE -ne "dry_run") { throw "execution mode is not qualified" }
          if ($env:CANDIDATE_SHA -notmatch "^[0-9a-f]{40}$") { throw "invalid candidate SHA" }
          if ($env:PLATFORM_VERSION -notmatch "^[0-9]+\.[0-9]+$") { throw "invalid platform version" }
          if ($env:MANIFEST_ID -notmatch "^release-sim-[0-9a-f]+$") { throw "invalid manifest ID" }
          if ((git rev-parse HEAD).Trim() -ne $env:CANDIDATE_SHA) { throw "checked out SHA does not match candidate SHA" }
      - name: Produce canonical execution evidence
        shell: powershell -ExecutionPolicy Bypass -File {0}
        env:
          ACTION: ${{ inputs.action }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
        run: |
          $evidence = [ordered]@{
            workflow = "platform-release-execution.yml"
            workflow_run_id = $env:GITHUB_RUN_ID
            repository = $env:GITHUB_REPOSITORY
            candidate_sha = $env:CANDIDATE_SHA
            platform_version = $env:PLATFORM_VERSION
            action = $env:ACTION
            artifact_hashes = @{}
            deployment_result = "NOT_EXECUTED"
            rollback = "PREPARED"
            timestamp = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")
            status = "PASS"
          }
          $evidence | ConvertTo-Json -Depth 4 | Set-Content -Encoding utf8 platform-release-execution-evidence.json
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: platform-release-execution-evidence
          path: platform-release-execution-evidence.json
          if-no-files-found: error
