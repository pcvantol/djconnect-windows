name: Semgrep

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@04b78708bfed26f96dd6436ad4372a648920110e
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-windows

  semgrep:
    uses: pcvantol/djconnect/.github/workflows/djconnect-semgrep-ci.yml@04b78708bfed26f96dd6436ad4372a648920110e # Repaired reachable workflow closure
    with:
      continue-on-error: true
