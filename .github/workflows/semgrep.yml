    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@5b235069a79f3f650e497a5b64a4bce4aeb1e031
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-windows

  semgrep:
    uses: pcvantol/djconnect/.github/workflows/djconnect-semgrep-ci.yml@5b235069a79f3f650e497a5b64a4bce4aeb1e031 # Repaired reachable workflow closure
    with:
      continue-on-error: true
