name: Semgrep

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@6ff2be61d8cd4041ac4bf21ef622ef330a0bc14a
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-windows

  semgrep:
    uses: pcvantol/djconnect/.github/workflows/djconnect-semgrep-ci.yml@6ff2be61d8cd4041ac4bf21ef622ef330a0bc14a # Repaired reachable workflow closure
    with:
      continue-on-error: true
